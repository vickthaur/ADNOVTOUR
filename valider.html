<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Check-in | ADNOV TOUR</title>
    
    <script src="script.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #0a3f70;
            --accent: #2b40d3;
            --success: #10b981;
            --bg-dark: #0F172A;
            --card-bg: #1E293B;
            --text-muted: #94a3b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg-dark); 
            color: white; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; padding: 20px;
            background-image: radial-gradient(circle at top center, rgba(43, 64, 211, 0.15) 0%, transparent 70%);
        }

        .valider-card { 
            background: var(--card-bg); 
            width: 100%; max-width: 450px; 
            border-radius: 32px; padding: 40px; 
            text-align: center; 
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }

        /* Barre tricolore décorative */
        .valider-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 6px;
            background: linear-gradient(90deg, #0a3f70, #2b40d3, #fdc533);
        }

        .icon-state {
            font-size: 50px; margin: 0 auto 20px; height: 90px; width: 90px;
            background: rgba(255,255,255,0.05); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }

        .welcome-tag { font-size: 11px; font-weight: 800; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 15px; }
        
        /* Affichage des données scannées */
        .user-name { font-size: 30px; font-weight: 800; margin-bottom: 8px; line-height: 1.2; }
        .user-fonction { font-size: 16px; color: #fdc533; font-weight: 700; text-transform: uppercase; margin-bottom: 20px; }
        
        .info-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px;
            background: rgba(0,0,0,0.2); padding: 20px; border-radius: 20px;
            margin-bottom: 30px; text-align: left;
        }
        .info-item label { display: block; font-size: 10px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin-bottom: 4px; }
        .info-item span { font-size: 14px; font-weight: 600; color: white; }

        .status-badge {
            padding: 12px 24px; border-radius: 100px; font-weight: 700; font-size: 13px;
            display: inline-flex; align-items: center; gap: 8px; margin-bottom: 30px;
        }
        .status-loading { background: rgba(255,255,255,0.1); color: white; }
        .status-success { background: rgba(16, 185, 129, 0.1); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.3); }

        .btn-next {
            display: block; width: 100%; background: var(--accent); color: white;
            text-decoration: none; padding: 20px; border-radius: 18px;
            font-size: 16px; font-weight: 800; transition: 0.3s;
            box-shadow: 0 10px 20px rgba(43, 64, 211, 0.3);
        }
        .btn-next:hover { transform: translateY(-3px); filter: brightness(1.1); }

        /* Animation de chargement */
        .pulse { animation: pulseAnim 1.5s infinite; }
        @keyframes pulseAnim { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="valider-card">
        <div id="loading-ui">
            <div class="icon-state pulse">⌛</div>
            <p style="font-weight: 700; letter-spacing: 1px;">IDENTIFICATION...</p>
        </div>

        <div id="result-ui" style="display: none;">
            <div class="welcome-tag">Accès Adnov Tour</div>
            
            <h1 class="user-name" id="res-fullname">...</h1>
            <div class="user-fonction" id="res-fonction">...</div>
            
            <div class="info-grid">
                <div class="info-item">
                    <label>Étude / Structure</label>
                    <span id="res-etude">...</span>
                </div>
                <div class="info-item">
                    <label>Ville</label>
                    <span id="res-ville">...</span>
                </div>
            </div>

            <div id="res-status" class="status-badge status-loading">
                <span class="pulse">⚙️ Synchronisation...</span>
            </div>

            <a href="scan.html" class="btn-next">SCANNER LE SUIVANT</a>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const email = urlParams.get('email');
            
            if (!email) {
                alert("Erreur : Badge invalide.");
                window.location.href = "scan.html";
                return;
            }

            try {
                // 1. RÉCUPÉRATION DES INFOS DANS BREVO
                const response = await fetch(`https://api.brevo.com/v3/contacts/${encodeURIComponent(email)}`, {
                    headers: { 'api-key': ADNOV_CONFIG.apiKey }
                });

                if (response.ok) {
                    const data = await response.json();
                    const attr = data.attributes;

                    // Mise à jour de l'interface
                    document.getElementById('loading-ui').style.display = 'none';
                    document.getElementById('result-ui').style.display = 'block';
                    
                    document.getElementById('res-fullname').innerText = `${attr.PRENOM} ${attr.NOM}`;
                    document.getElementById('res-fonction').innerText = attr.FONCTION || "Fonction non renseignée";
                    document.getElementById('res-etude').innerText = attr.ETUDES || "-";
                    document.getElementById('res-ville').innerText = attr.VILLE || "-";

                    // 2. MISE À JOUR DU STATUT EN "PRÉSENT"
                    const updateRes = await fetch(`https://api.brevo.com/v3/contacts/${encodeURIComponent(email)}`, {
                        method: 'PUT',
                        headers: { 
                            'api-key': ADNOV_CONFIG.apiKey,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            attributes: { STATUT_EVENT: "Présent" }
                        })
                    });

                    if (updateRes.ok) {
                        document.getElementById('res-status').innerHTML = "✅ ENTRÉE VALIDÉE";
                        document.getElementById('res-status').className = "status-badge status-success";
                    }

                } else {
                    // Erreur : Contact non trouvé
                    document.getElementById('loading-ui').innerHTML = `
                        <div class="icon-state">❌</div>
                        <h1 class="user-name">Badge Inconnu</h1>
                        <p style="color:#94a3b8; margin: 15px 0 25px;">Ce participant n'est pas inscrit.</p>
                        <a href="scan.html" class="btn-next" style="background:#ef4444">RETOUR</a>
                    `;
                }
            } catch (error) {
                console.error(error);
                alert("Erreur de connexion API.");
            }
        });
    </script>
</body>
</html>
