<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner | ADNOV TOUR</title>
    
    <script src="script.js"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --primary: #0a3f70;       /* Bleu Marine ADNOV */
            --accent: #2b40d3;        /* Bleu Électrique ADNOV */
            --warning: #fdc533;       /* Jaune Or ADNOV */
            --primary-glow: rgba(43, 64, 211, 0.2);
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #0F172A; 
            color: white; 
            display: flex; flex-direction: column; 
            align-items: center; justify-content: center; 
            min-height: 100vh; padding: 20px; text-align: center; 
            /* Lueur dynamique héritée du badge */
            background-image: radial-gradient(circle at top center, var(--primary-glow) 0%, transparent 70%);
        }
        
        .header { margin-bottom: 30px; }
        
        .brand-tag {
            font-size: 10px;
            font-weight: 800;
            color: var(--accent);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 10px;
            opacity: 0.8;
        }

        .title { font-size: 26px; font-weight: 800; letter-spacing: -0.5px; color: white; }

        /* Conteneur de la caméra Style "Badge" */
        #camera-container {
            width: 100%; max-width: 400px; 
            background: #1E293B; 
            border-radius: 32px; 
            padding: 20px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.08);
            position: relative;
            overflow: hidden;
        }

        /* Barre tricolore décorative */
        #camera-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--accent), var(--warning));
        }

        #reader { 
            width: 100%; border-radius: 20px; overflow: hidden; 
            border: none !important; 
            background: black;
        }
        
        .status { 
            margin-top: 30px; padding: 16px 30px; 
            border-radius: 100px; background: rgba(255,255,255,0.05); 
            font-size: 14px; font-weight: 700; color: #cbd5e1; 
            display: inline-block; border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s ease;
        }
        
        /* Personnalisation des boutons natifs du scanner html5-qrcode */
        #reader button { 
            background: var(--accent) !important; color: white !important; 
            border: none !important; padding: 14px 28px !important; 
            border-radius: 14px !important; font-weight: 800 !important; 
            margin: 15px 0 !important; cursor: pointer !important; 
            font-family: inherit !important; 
            text-transform: uppercase; letter-spacing: 1px;
            transition: 0.3s;
        }
        #reader button:hover { transform: translateY(-2px); filter: brightness(1.2); }
        
        /* Lien de changement de caméra */
        #reader a { color: #94a3b8 !important; text-decoration: none; font-size: 12px; margin-top: 10px; display: block; }

        .footer-adnov {
            margin-top: 40px;
            font-size: 10px;
            color: #475569;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="brand-tag">TERMINAL DE CHECK-IN</div>
        <div class="title">ADNOV TOUR</div>
    </div>

    <div id="camera-container">
        <div id="reader"></div>
    </div>
    
    <div class="status" id="statut">Prêt à scanner un badge... 📷</div>

    <div class="footer-adnov">SYSTÈME D'ACCÈS SÉCURISÉ ADNOV</div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Le script.js se charge d'initialiser les couleurs et la config
            const statut = document.getElementById('statut');
            let scanVerrouille = false;

            function onScanSuccess(decodedText, decodedResult) {
                // Verrou pour éviter de scanner 10 fois le même badge en 1 seconde
                if (scanVerrouille) return; 
                scanVerrouille = true;

                // Feedback visuel de succès
                statut.style.background = "#10b981"; // Vert succès
                statut.style.color = "white";
                statut.style.borderColor = "#10b981";
                statut.innerHTML = "✅ Badge détecté !";

                // Redirection vers valider.html avec l'email scanné
                // Le paramètre event=adnov_tour permet de rester dans le bon contexte
                setTimeout(() => {
                    window.location.href = `valider.html?email=${encodeURIComponent(decodedText)}&event=adnov_tour`;
                }, 600); 
            }

            // Configuration du scanner (Optimisé pour mobile)
            const html5QrcodeScanner = new Html5QrcodeScanner("reader", { 
                fps: 15, 
                qrbox: { width: 250, height: 250 },
                aspectRatio: 1.0 
            }, false);
            
            html5QrcodeScanner.render(onScanSuccess);
        });
    </script>
</body>
</html>
