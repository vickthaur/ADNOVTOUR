<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Badge d'Accès | ADNOV TOUR</title>
    
    <script src="script.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            /* Palette ADNOV issue de vos images */
            --primary: #0a3f70;       /* Bleu Marine */
            --accent: #2b40d3;        /* Bleu Électrique */
            --warning: #fdc533;       /* Jaune Or */
            --bg-dark: #0F172A;       /* Fond Sombre Premium */
            --card-bg: #1E293B;       /* Fond de la carte */
            --accent-glow: rgba(43, 64, 211, 0.3);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg-dark); 
            color: white; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; padding: 20px; 
            /* Effet de lueur en haut de l'écran */
            background-image: radial-gradient(circle at top center, var(--accent-glow) 0%, transparent 70%);
        }

        .badge-card { 
            background: var(--card-bg); 
            width: 100%; max-width: 380px; 
            border-radius: 32px; padding: 40px 30px; 
            text-align: center; 
            border: 1px solid rgba(255,255,255,0.08); 
            box-shadow: 0 25px 50px rgba(0,0,0,0.6); 
            position: relative;
            overflow: hidden;
            animation: badgeIn 0.8s cubic-bezier(0.23, 1, 0.32, 1);
        }

        @keyframes badgeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Ligne décorative ADNOV en haut */
        .badge-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 6px;
            background: linear-gradient(90deg, var(--primary), var(--accent), var(--warning));
        }

        .brand-badge {
            font-size: 10px; font-weight: 800; color: var(--accent);
            letter-spacing: 2px; text-transform: uppercase; margin-bottom: 25px;
        }

        .event-logo { 
            font-size: 24px; font-weight: 800; color: white;
            letter-spacing: -1px; margin-bottom: 30px;
        }

        .user-identity { margin-bottom: 35px; }
        .user-name { font-size: 26px; font-weight: 800; color: white; margin-bottom: 5px; }
        .user-structure { font-size: 14px; color: #94a3b8; font-weight: 500; }

        /* Section QR Code */
        .qr-section {
            background: rgba(255, 255, 255, 0.03); padding: 30px; border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.05); margin-bottom: 20px;
        }

        #qrcode { 
            background: white; padding: 15px; border-radius: 20px; 
            display: inline-block; margin-bottom: 15px;
            box-shadow: 0 0 30px rgba(43, 64, 211, 0.2);
        }
        
        .instructions { font-size: 12px; color: #64748b; line-height: 1.5; font-weight: 500; }

        /* Zone d'action */
        .badge-footer { margin-top: 20px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); }
        .status-pill {
            display: inline-flex; align-items: center; gap: 8px;
            background: rgba(16, 185, 129, 0.1); color: #10b981;
            padding: 8px 16px; border-radius: 100px; font-size: 12px; font-weight: 700;
        }

        .btn-save {
            display: block; width: 100%; background: var(--primary); color: white;
            text-decoration: none; padding: 16px; border-radius: 16px;
            font-size: 14px; font-weight: 700; margin-top: 20px; transition: 0.3s;
        }
        .btn-save:hover { background: var(--accent); transform: translateY(-2px); }

        .app-footer { margin-top: 25px; font-size: 10px; color: #475569; font-weight: 600; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="badge-card">
        <div class="brand-badge">BADGE D'ACCÈS DIGITAL</div>
        <div class="event-logo">ADNOV TOUR</div>
        
        <div class="user-identity">
            <div class="user-name" id="display-name">Chargement...</div>
            <div class="user-structure" id="display-structure">Veuillez patienter</div>
        </div>

        <div class="qr-section">
            <div id="qrcode"></div>
            <p class="instructions">Présentez ce QR Code à l'accueil<br>pour valider votre entrée.</p>
        </div>

        <div class="badge-footer">
            <div class="status-pill">
                <span style="width: 8px; height: 8px; background: #10b981; border-radius: 50%;"></span>
                INSCRIPTION VALIDÉE
            </div>
            <a href="javascript:window.print()" class="btn-save">Enregistrer ou Imprimer</a>
        </div>

        <div class="app-footer">SÉCURISÉ PAR ADNOV</div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 1. Récupération des paramètres dans l'URL
            const urlParams = new URLSearchParams(window.location.search);
            const prenom = urlParams.get('prenom') || "Participant";
            const nom = urlParams.get('nom') || "";
            const etude = urlParams.get('etude') || "Structure non renseignée";
            const email = urlParams.get('email');

            // 2. Mise à jour de l'affichage
            document.getElementById('display-name').innerText = `${prenom} ${nom}`;
            document.getElementById('display-structure').innerText = etude;

            // 3. Génération du QR Code basé sur l'email
            if (email) {
                new QRCode(document.getElementById("qrcode"), {
                    text: email,
                    width: 160,
                    height: 160,
                    colorDark : "#0a3f70", // Bleu Marine ADNOV
                    colorLight : "#ffffff",
                    correctLevel : QRCode.CorrectLevel.H
                });
            } else {
                document.getElementById('qrcode').innerHTML = "<p style='color:black; font-size:12px;'>Email manquant</p>";
            }
        });
    </script>
</body>
</html>
